    Fail empty flow files: 'true'
    Known Brokers: PUBLISH_KAFKA_PROCESSOR_BROKER_ADDRESS
    Max Flow Segment Size: 0 B
    Message Timeout: 30 sec
    Queue Buffering Max Time: 5 ms
    Queue Max Buffer Size: 10 MB
    Queue Max Message: '10000'
    Request Timeout: 10 sec
    Target Batch Payload Size: 512 KB
